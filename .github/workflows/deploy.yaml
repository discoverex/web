name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 강제 배포 옵션 - 코드가 변하지 않았어도 언제든 수동 실행 가능
    inputs:
      force_app:
        description: '강제 배포할 앱 이름 (game-hub, discoverex, magic-eye)'
        required: false
        default: ''

env:
  PROJECT_ID: discoverex-project # 실제 프로젝트 ID로 변경 필요 시 수정
  REGION: asia-northeast3
  GAR_LOCATION: asia-northeast3-docker.pkg.dev

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-apps.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # 각 앱별로 감지할 경로를 명확히 지정합니다.
          filters: |
            game-hub:
              - 'apps/game-hub/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'
            discoverex:
              - 'apps/discoverex/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'
            magic-eye:
              - 'apps/magic-eye/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'

      - id: set-apps
        name: Create clean JSON array of changed apps
        run: |
          # 빈 배열로 시작
          APPS=$(echo "[]" | jq -c .)
          
          # 각 필터가 true인 경우에만 배열에 추가 (jq 활용)
          if [ "${{ steps.filter.outputs.game-hub }}" == 'true' ]; then
            APPS=$(echo "$APPS" | jq -c '. += ["game-hub"]')
          fi
          
          if [ "${{ steps.filter.outputs.discoverex }}" == 'true' ]; then
            APPS=$(echo "$APPS" | jq -c '. += ["discoverex"]')
          fi
          
          if [ "${{ steps.filter.outputs.magic-eye }}" == 'true' ]; then
            APPS=$(echo "$APPS" | jq -c '. += ["magic-eye"]')
          fi
          
          # 최종 결과 출력 (이 값이 matrix로 들어갑니다)
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  deploy:
    needs: filter
    if: ${{ needs.filter.outputs.apps != '[]' && needs.filter.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.filter.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build and Push Container
        run: |-
          docker build \
            --no-cache \
            --build-arg APP_NAME=${{ matrix.app }} \
            --build-arg NEXT_PUBLIC_SERVER_URL="${{ secrets.NEXT_PUBLIC_SERVER_URL }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            -t ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }} .
          
          docker push ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy discoverex-${{ matrix.app }} \
            --image ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
