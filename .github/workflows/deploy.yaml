name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: your-project-id
  REGION: asia-northeast3 # 서울 리전
  SERVICE_NAME: discoverex-web
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/web-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. GCP 인증 (Workload Identity Federation 권장)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Docker 설정
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker

      # 3. Docker 인증 및 빌드/푸시 (프론트엔드 버전)
      - name: Build and Push Container
        env:
          FB_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          FB_STORAGE: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FB_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: |-
          # Artifact Registry 인증
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev
          
          # 이미지 빌드 (프론트엔드 앱 이름으로 태깅)
          docker build \
            --no-cache \
            --build-arg PORT=${{ secrets.WEB_PORT }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$FB_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$FB_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$FB_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$FB_STORAGE" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$FB_SENDER_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$FB_APP_ID" \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/web:${{ github.sha }} .
          
          # 이미지 푸시
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/web:${{ github.sha }}

      # 4. Cloud Run에 배포
      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy discoverex-web \
            --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/web:${{ github.sha }} \
            --region asia-northeast3 \
            --port ${{ secrets.WEB_PORT }} \
            --platform managed \
            --quiet \
            --allow-unauthenticated