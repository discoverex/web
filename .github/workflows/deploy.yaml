name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: # 강제 배포 옵션 - 코드가 변하지 않았어도 언제든 수동 실행 가능
    inputs:
      force_app:
        description: "강제 배포할 앱 이름 (game-hub, discoverex, magic-eye)"
        required: false
        default: ""

env:
  PROJECT_ID: discoverex-project # 실제 프로젝트 ID로 변경 필요 시 수정
  REGION: asia-northeast3
  GAR_LOCATION: asia-northeast3-docker.pkg.dev
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-apps.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            game-hub:
              - 'apps/game-hub/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'
            discoverex:
              - 'apps/discoverex/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'
            magic-eye:
              - 'apps/magic-eye/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'Dockerfile'

      - id: set-apps
        name: Decide which apps to deploy
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          # 1. 수동 실행인 경우
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT_APP="${{ github.event.inputs.force_app }}"
            if [ -n "$INPUT_APP" ] && [ "$INPUT_APP" != "all" ]; then
              # 특정 앱만 지정한 경우 (예: game-hub)
              echo "apps=[\"$INPUT_APP\"]" >> $GITHUB_OUTPUT
            else
              # 입력이 없거나 "all"인 경우 전체 배포
              echo 'apps=["game-hub", "discoverex", "magic-eye"]' >> $GITHUB_OUTPUT
            fi
          else
            # 2. Push 실행인 경우
            # 환경 변수 $CHANGES를 사용하여 따옴표가 유실되지 않도록 합니다.
            echo "apps=$CHANGES" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: filter
    # matrix.app이 비어있지 않고, 실제 앱 이름이 담겼을 때만 실행
    if: ${{ needs.filter.outputs.apps != '[]' && needs.filter.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.filter.outputs.apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build and Push Container
        run: |-
          echo "Building app: ${{ matrix.app }}"
          docker build \
            --no-cache \
            --build-arg "APP_NAME=${{ matrix.app }}" \
            --build-arg "NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg "NEXT_PUBLIC_IMAGE_BUCKET_NAME=${{ secrets.NEXT_PUBLIC_IMAGE_BUCKET_NAME }}" \
            --build-arg "NEXT_PUBLIC_MODEL_BUCKET_NAME=${{ secrets.NEXT_PUBLIC_MODEL_BUCKET_NAME }}" \
            -t ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }} .

          docker push ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: discoverex-${{ matrix.app }}
          image: ${{ env.GAR_LOCATION }}/${{ secrets.GCP_PROJECT_ID }}/apps/${{ matrix.app }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: --allow-unauthenticated --timeout=10m
          env_vars: |
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_IMAGE_BUCKET_NAME=${{ secrets.NEXT_PUBLIC_IMAGE_BUCKET_NAME }}
            NEXT_PUBLIC_MODEL_BUCKET_NAME=${{ secrets.NEXT_PUBLIC_MODEL_BUCKET_NAME }}
            GCP_SERVICE_ACCOUNT_JSON=${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
